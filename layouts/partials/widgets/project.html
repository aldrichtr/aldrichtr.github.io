{{ if .Site.Taxonomies.projects }}
<div class="bg-white panel mb-3 pb-5 dark:bg-zinc-900">
    <p class="text-xl text-center text-zinc-700 py-5 dark:text-zinc-300">Projects</p>
    {{ range $key, $value := .Site.Taxonomies.projects }}
    <a class="text-center block duration-100 py-2 px-4 mx-4 hover:bg-zinc-100 text-zinc-800 dark:text-zinc-200 dark:hover:bg-zinc-800" href="{{ $.Site.BaseURL }}/categories/{{ $key | urlize  }}">{{ $key | humanize }}</a> {{ end }}
</div>
{{ end }}
