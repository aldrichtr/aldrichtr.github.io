{{ $filteredPosts := where .Site.RegularPages "Type" "in" site.Params.mainSections }}
{{ $relatedPosts := shuffle $filteredPosts | first 5 }}
{{- if $relatedPosts }}
<div class="bg-white panel mb-3 pb-5 dark:bg-zinc-900">
    <p class="text-xl text-center text-zinc-700 py-5 dark:text-zinc-300 font-bold">Recent Posts</p>
    <div class="mx-6">
        {{ range $relatedPosts }}
        <a href="{{ .RelPermalink }}" class="">
            <div
                class="w-full block mt-3 bg-white hover:bg-zinc-100 duration-200 dark:bg-zinc-900 dark:text-zinc-200 dark:hover:bg-zinc-800">
                <div class="px-2">
                    <div class="text-zinc-900 font-bold text-xl dark:text-white">{{.Title}}</div>
                    <p class="text-sm text-zinc-600 flex items-center pb-1 dark:text-zinc-400">
                        <time><span class="icon-access_time mr-1"></span>{{.Date.Format "2006/01/02"}}</time>
                    </p>
                </div>
            </div>
            {{- end }}
        </a>
        {{- end }}
    </div>
</div>
